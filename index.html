<html lang="en">

  <style>
/* ============================================
   PhysioTrainer â€” Design System & Styles
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap');

/* ---------- CSS Variables ---------- */
:root {
  /* Background */
  --bg-primary: #000000;
  --bg-secondary: #0a0a0a;
  --bg-card: #111111;
  --bg-card-hover: #1a1a1a;
  --bg-elevated: #1a1a1a;

  /* Accent */
  --accent-primary: #38bdf8;
  --accent-secondary: #0ea5e9;
  --accent-gradient: linear-gradient(135deg, #38bdf8, #0ea5e9);
  --accent-gradient-hover: linear-gradient(135deg, #0ea5e9, #0284c7);

  /* Text */
  --text-primary: #f0f0f5;
  --text-secondary: #a0a0b8;
  --text-muted: #6b6b80;

  /* Feedback */
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;

  /* Glass */
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.05);
  --glass-blur: blur(20px);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 10px rgba(56, 189, 248, 0.1);
  --shadow-glow-accent: 0 0 15px rgba(56, 189, 248, 0.2);
}

/* ---------- Reset & Base ---------- */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
}

/* ---------- App Container (Desktop centering) ---------- */
#app-wrapper {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background-color: var(--bg-secondary);
  box-shadow: 0 0 80px rgba(124, 58, 237, 0.08);
}

/* ---------- Typography ---------- */
h1, h2, h3 {
  font-family: 'Inter', sans-serif;
  line-height: 1.2;
}

h1 { font-size: 2rem; font-weight: 700; }
h2 { font-size: 1.5rem; font-weight: 600; }
h3 { font-size: 1.25rem; font-weight: 600; }

.text-secondary { color: var(--text-secondary); }
.text-muted { color: var(--text-muted); }
.text-small { font-size: 0.875rem; }
.text-caption { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

/* ---------- Header ---------- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(18, 18, 26, 0.85);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
}

.header-left {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.header-title {
  font-family: 'Inter', sans-serif;
  font-size: 1.125rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 250px;
}

.btn-back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: none;
  background: var(--glass-bg);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  cursor: pointer;
  transition: var(--transition-fast);
  flex-shrink: 0;
}

.btn-back:hover {
  background: var(--bg-card-hover);
}

.btn-back svg {
  width: 20px;
  height: 20px;
}

/* ---------- Main Content ---------- */
.main-content {
  padding: var(--space-lg);
  padding-bottom: 100px;
  min-height: calc(100vh - 60px - 70px);
}

/* ---------- Bottom Nav ---------- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: var(--space-sm) var(--space-md);
  padding-bottom: calc(var(--space-sm) + env(safe-area-inset-bottom, 0px));
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-top: 1px solid var(--glass-border);
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: var(--space-xs) var(--space-sm);
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition-normal);
  border-radius: var(--radius-sm);
  min-width: 60px;
}

.nav-item svg {
  width: 24px;
  height: 24px;
  transition: var(--transition-normal);
}

.nav-item span {
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.nav-item.active {
  color: var(--accent-primary);
}

.nav-item.active svg {
  filter: drop-shadow(0 0 6px rgba(124, 58, 237, 0.5));
}

.nav-item:hover {
  color: var(--text-secondary);
}

/* ---------- Cards ---------- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  cursor: pointer;
  transition: var(--transition-normal);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent-gradient);
  opacity: 0;
  transition: var(--transition-normal);
}

.card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.card:hover::before {
  opacity: 1;
}

.card:active {
  transform: translateY(0) scale(0.98);
}

.card-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  flex-shrink: 0;
}

.card-icon.gradient {
  background: var(--accent-gradient);
}

.card-body {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 2px;
}

.card-subtitle {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.card-arrow {
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Exercise / Workout Cards */
.exercise-card, .workout-card {
  margin-bottom: var(--space-md);
}

.exercise-thumb {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-md);
  background: var(--bg-elevated);
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.exercise-thumb img, .exercise-thumb video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.exercise-thumb .placeholder-icon {
  color: var(--text-muted);
  font-size: 1.5rem;
}

/* Card actions */
.card-actions {
  display: flex;
  gap: var(--space-sm);
  align-items: center;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-lg);
  border: none;
  border-radius: var(--radius-md);
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition-normal);
  white-space: nowrap;
  text-decoration: none;
  line-height: 1.5;
}

.btn:active {
  transform: scale(0.96);
}

.btn-primary {
  background: var(--accent-gradient);
  color: white;
  box-shadow: var(--shadow-glow);
}

.btn-primary:hover {
  background: var(--accent-gradient-hover);
  box-shadow: var(--shadow-glow-accent);
}

.btn-secondary {
  background: var(--glass-bg);
  color: var(--text-primary);
  border: 1px solid var(--glass-border);
}

.btn-secondary:hover {
  background: var(--bg-card-hover);
  border-color: rgba(255, 255, 255, 0.15);
}

.btn-danger {
  background: rgba(239, 68, 68, 0.15);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.2);
}

.btn-danger:hover {
  background: rgba(239, 68, 68, 0.25);
}

.btn-success {
  background: var(--success);
  color: white;
}

.btn-success:hover {
  background: #0ea472;
}

.btn-icon {
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: var(--radius-sm);
}

.btn-icon.small {
  width: 32px;
  height: 32px;
}

.btn-lg {
  padding: var(--space-md) var(--space-xl);
  font-size: 1rem;
  border-radius: var(--radius-lg);
}

.btn-full {
  width: 100%;
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
}

.btn svg {
  width: 18px;
  height: 18px;
}

/* ---------- Inputs ---------- */
.form-group {
  margin-bottom: var(--space-lg);
}

.form-label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  margin-bottom: var(--space-sm);
}

.form-input, .form-textarea {
  width: 100%;
  padding: var(--space-md);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  transition: var(--transition-normal);
  outline: none;
}

.form-input::placeholder, .form-textarea::placeholder {
  color: var(--text-muted);
}

.form-input:focus, .form-textarea:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
}

.form-input.error, .form-textarea.error {
  border-color: var(--danger);
  animation: shake 0.4s ease;
}

.form-textarea {
  resize: vertical;
  min-height: 100px;
}

.form-error {
  font-size: 0.75rem;
  color: var(--danger);
  margin-top: var(--space-xs);
}

/* ---------- Media Upload Area ---------- */
.media-upload-area {
  width: 100%;
  aspect-ratio: 16/10;
  border: 2px dashed var(--glass-border);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  background: var(--bg-card);
  cursor: pointer;
  transition: var(--transition-normal);
  overflow: hidden;
  position: relative;
}

.media-upload-area:hover {
  border-color: var(--accent-primary);
  background: rgba(124, 58, 237, 0.05);
}

.media-upload-area.has-media {
  border-style: solid;
  border-color: var(--glass-border);
  cursor: default;
}

.media-upload-area img, .media-upload-area video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: absolute;
  top: 0;
  left: 0;
}

.media-upload-placeholder {
  text-align: center;
  color: var(--text-muted);
}

.media-upload-placeholder svg {
  width: 40px;
  height: 40px;
  margin-bottom: var(--space-sm);
  opacity: 0.5;
}

.media-action-btns {
  display: flex;
  gap: var(--space-md);
  margin-top: var(--space-md);
}

.media-action-btns .btn {
  flex: 1;
}

/* ---------- Badge ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: var(--radius-full);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.badge-accent {
  background: rgba(124, 58, 237, 0.15);
  color: var(--accent-primary);
}

.badge-teal {
  background: rgba(6, 182, 212, 0.15);
  color: var(--accent-secondary);
}

.badge-success {
  background: rgba(16, 185, 129, 0.15);
  color: var(--success);
}

.badge-muted {
  background: rgba(107, 107, 128, 0.15);
  color: var(--text-muted);
}

/* ---------- Modal ---------- */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition-normal);
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg-secondary);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  padding: var(--space-lg);
  transform: translateY(100%);
  transition: var(--transition-slow);
}

.modal-overlay.active .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--text-muted);
  border-radius: var(--radius-full);
  margin: 0 auto var(--space-lg);
  opacity: 0.4;
}

.modal-title {
  font-family: 'Inter', sans-serif;
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: var(--space-lg);
}

/* ---------- Toast ---------- */
.toast-container {
  position: fixed;
  top: var(--space-lg);
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  max-width: 440px;
  width: calc(100% - var(--space-xl));
  pointer-events: none;
}

.toast {
  padding: var(--space-md) var(--space-lg);
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
}

.toast-success {
  background: rgba(16, 185, 129, 0.9);
  color: white;
  border: 1px solid rgba(16, 185, 129, 0.5);
}

.toast-error {
  background: rgba(239, 68, 68, 0.9);
  color: white;
  border: 1px solid rgba(239, 68, 68, 0.5);
}

.toast-info {
  background: rgba(124, 58, 237, 0.9);
  color: white;
  border: 1px solid rgba(124, 58, 237, 0.5);
}

/* ---------- Checkbox List (for exercise selection modal) ---------- */
.checkbox-list {
  list-style: none;
  max-height: 50vh;
  overflow-y: auto;
}

.checkbox-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition-fast);
}

.checkbox-item:hover {
  background: var(--glass-bg);
}

.checkbox-custom {
  width: 22px;
  height: 22px;
  border: 2px solid var(--text-muted);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: var(--transition-fast);
}

.checkbox-item.checked .checkbox-custom {
  background: var(--accent-gradient);
  border-color: transparent;
}

.checkbox-item.checked .checkbox-custom::after {
  content: '\2713';
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
}

.checkbox-label {
  flex: 1;
  font-size: 0.95rem;
}

/* ---------- Sortable List ---------- */
.sortable-list {
  list-style: none;
}

.sortable-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-sm);
  transition: var(--transition-fast);
}

.sortable-item:hover {
  background: var(--bg-card-hover);
}

.sortable-handle {
  color: var(--text-muted);
  cursor: grab;
  display: flex;
  align-items: center;
  padding: var(--space-xs);
}

.sortable-handle:active {
  cursor: grabbing;
}

.sortable-name {
  flex: 1;
  font-size: 0.95rem;
}

.sortable-remove {
  color: var(--text-muted);
  cursor: pointer;
  padding: var(--space-xs);
  transition: var(--transition-fast);
  background: none;
  border: none;
  display: flex;
}

.sortable-remove:hover {
  color: var(--danger);
}

/* ---------- Player ---------- */
.player-media {
  width: 100%;
  aspect-ratio: 16/10;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-card);
  margin-bottom: var(--space-lg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.player-media img, .player-media video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.player-media .placeholder-icon {
  font-size: 3rem;
  color: var(--text-muted);
}

/* Timer Block */
.player-block {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
}

.player-block-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
}

.player-block-header svg {
  width: 16px;
  height: 16px;
}

.timer-display {
  text-align: center;
  font-family: 'Inter', monospace;
  font-size: 3.5rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: var(--space-md) 0;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: var(--transition-fast);
}

.timer-display.running {
  animation: timerGlow 2s ease-in-out infinite;
}

.timer-controls {
  display: flex;
  gap: var(--space-sm);
  justify-content: center;
}

.timer-controls .btn {
  flex: 1;
  max-width: 100px;
}

/* Reps Block */
.reps-display {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 4rem;
  font-weight: 700;
  padding: var(--space-sm) 0;
  color: var(--text-primary);
  transition: var(--transition-fast);
}

.reps-display.pop {
  animation: numberPop 0.2s ease;
}

.reps-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-xl);
  margin-bottom: var(--space-lg);
}

.btn-rep {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--glass-border);
  border-radius: var(--radius-full);
  background: var(--bg-elevated);
  color: var(--text-primary);
  cursor: pointer;
  transition: var(--transition-fast);
  font-family: 'Inter', sans-serif;
  font-weight: 700;
}

.btn-rep:active {
  transform: scale(0.92);
}

.btn-rep-minus {
  width: 48px;
  height: 48px;
  font-size: 1.5rem;
}

.btn-rep-plus {
  width: 64px;
  height: 64px;
  font-size: 2rem;
  border-color: var(--accent-primary);
  box-shadow: 0 0 12px rgba(124, 58, 237, 0.2);
}

.btn-rep-plus:hover {
  background: rgba(124, 58, 237, 0.15);

.sets-history {

}

.sets-history-title {

.set-pills {

/* ---------- Search ---------- */
.search-bar {

.search-bar svg {

  left: var(--space-md);

  height: 18px;

.search-bar input {

.search-bar input:focus {

}

/* ---------- Empty State ---------- */
.empty-state {

}

.empty-state-icon {

}

.empty-state-title {

  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: var(--space-sm);
}

.empty-state-text {

  font-size: 0.9rem;
  margin-bottom: var(--space-lg);
}

/* ---------- Section Title ---------- */

.welcome-subtitle {

}

/* ---------- Quick Actions grid ---------- */
.quick-actions {

}

.quick-action-card {

  cursor: pointer;
  transition: var(--transition-normal);
  text-decoration: none;
  color: var(--text-primary);
}

.quick-action-card:hover {

}

.quick-action-card:active {

}

.quick-action-icon {

}

.quick-action-label {
  font-size: 0.8rem;
  font-weight: 600;

}

/* ---------- Exercise list in play mode ---------- */
.play-exercise-list .card {

}

.play-exercise-number {

  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

/* ---------- Animations ---------- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeFloat {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-20px); }
}

@keyframes numberPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

@keyframes pillAppear {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes timerGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
}

@keyframes wave {
  0% { transform: rotate(0deg); }
  10% { transform: rotate(14deg); }
  20% { transform: rotate(-8deg); }
  30% { transform: rotate(14deg); }
  40% { transform: rotate(-4deg); }
  50% { transform: rotate(10deg); }
  60% { transform: rotate(0deg); }
  100% { transform: rotate(0deg); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideOutLeft {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(-30px); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes confettiBurst {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 0.8; }
  100% { transform: scale(0) rotate(360deg); opacity: 0; }
}

/* Staggered animation utility */
.stagger-item {
  animation: fadeIn 0.35s ease both;
}

.stagger-item:nth-child(1) { animation-delay: 0.05s; }
.stagger-item:nth-child(2) { animation-delay: 0.1s; }
.stagger-item:nth-child(3) { animation-delay: 0.15s; }
.stagger-item:nth-child(4) { animation-delay: 0.2s; }
.stagger-item:nth-child(5) { animation-delay: 0.25s; }
.stagger-item:nth-child(6) { animation-delay: 0.3s; }
.stagger-item:nth-child(7) { animation-delay: 0.35s; }
.stagger-item:nth-child(8) { animation-delay: 0.4s; }
.stagger-item:nth-child(9) { animation-delay: 0.45s; }
.stagger-item:nth-child(10) { animation-delay: 0.5s; }

/* View Transition */
.view-enter {
  animation: slideInRight 0.3s ease both;
}

/* ---------- Scrollbar ---------- */
::-webkit-scrollbar {

}

::-webkit-scrollbar-track {

}

.hidden { display: none !important; }

.sets-table {
  display: flex;

  gap: 6px;
}

}

.session-summary {

.player-collapsible-item {

function icon(name) {
    return icons[name] || '';
  }

  // --- Toast ---
  function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    const iconHtml = type === 'success' ? '&#10003;' : type === 'error' ? '&#10005;' : '&#8505;';
    toast.innerHTML = `<span>${iconHtml}</span> ${message}`;

    container.appendChild(toast);
    setTimeout(() => {
      if (toast.parentNode) toast.remove();
    }, 3200);
  }

  // --- Modal ---
  let currentModalOverlay = null;

  function handleModalPopState(e) {
    if (currentModalOverlay) {
      closeModal(true); // From pop state = true
    }
  }

  function showModal(title, contentHtml, options = {}) {
    closeModal();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';

    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-handle"></div>
        <h3 class="modal-title">${title}</h3>
        <div class="modal-body">${contentHtml}</div>
      </div>
    `;

    document.body.appendChild(overlay);
    currentModalOverlay = overlay;

    // Support Android Back Button
    window.history.pushState({ modalOpen: true }, '');
    window.addEventListener('popstate', handleModalPopState);

    // Click outside to close
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    // Animate in
    requestAnimationFrame(() => {
      overlay.classList.add('active');
    });

    return overlay;
  }

  function closeModal(fromPopState = false) {
    if (currentModalOverlay) {
      currentModalOverlay.classList.remove('active');
      setTimeout(() => {
        if (currentModalOverlay && currentModalOverlay.parentNode) {
          currentModalOverlay.remove();
        }
        currentModalOverlay = null;
      }, 300);
      
      window.removeEventListener('popstate', handleModalPopState);
      
      // If we are closing it programmatically instead of pressing back
      if (!fromPopState && window.history.state && window.history.state.modalOpen) {
        window.history.back();
      }
    }
  }

  function confirmModal(title, message, onConfirm) {
    const content = `
      <p style="color: var(--text-secondary); margin-bottom: var(--space-lg); line-height: 1.5;">${message}</p>
      <div style="display: flex; gap: var(--space-md);">
        <button class="btn btn-secondary btn-full" id="modal-cancel">Cancel</button>
        <button class="btn btn-danger btn-full" id="modal-confirm">Confirm</button>
      </div>
    `;

    const overlay = showModal(title, content);

    overlay.querySelector('#modal-cancel').addEventListener('click', closeModal);
    overlay.querySelector('#modal-confirm').addEventListener('click', () => {
      closeModal();
      if (onConfirm) onConfirm();
    });
  }

  function tripleActionModal(title, message, btn1Text, on1, btn2Text, on2, btn3Text, on3) {
    const content = `
      <p style="color: var(--text-secondary); margin-bottom: var(--space-lg); line-height: 1.5;">${message}</p>
      <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
        <button class="btn btn-success btn-full" id="modal-btn-1">${btn1Text}</button>
        <button class="btn btn-danger btn-full" id="modal-btn-2">${btn2Text}</button>
        <button class="btn btn-secondary btn-full" id="modal-btn-3">${btn3Text}</button>
      </div>
    `;

    const overlay = showModal(title, content);

    overlay.querySelector('#modal-btn-1').addEventListener('click', () => { closeModal(); if (on1) on1(); });
    overlay.querySelector('#modal-btn-2').addEventListener('click', () => { closeModal(); if (on2) on2(); });
    overlay.querySelector('#modal-btn-3').addEventListener('click', () => { closeModal(); if (on3) on3(); });
  }

  // --- Image Compression ---
  function compressImage(file, maxWidth = 1200, quality = 0.8) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width;
          let h = img.height;

          if (w > maxWidth) {
            h = (maxWidth / w) * h;
            w = maxWidth;
          }

          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);

          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function generateThumbnail(dataUrl, maxSize = 200) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width;
        let h = img.height;

        if (w > h) {
          if (w > maxSize) { h = (maxSize / w) * h; w = maxSize; }
        } else {
          if (h > maxSize) { w = (maxSize / h) * w; h = maxSize; }
        }

        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = reject;
      img.src = dataUrl;
    });
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // --- Time formatting ---
  function formatTime(totalSeconds) {
    const mins = Math.floor(totalSeconds / 60);
    const secs = totalSeconds % 60;
    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
  }

  // --- Greeting based on time ---
  function getGreeting() {
    const hour = new Date().getHours();
    if (hour < 12) return 'Good morning';
    if (hour < 18) return 'Good afternoon';
    return 'Good evening';
  }

  // --- Workout Colors ---
  function getWorkoutColor(workoutId) {
    const workouts = Storage.getWorkouts();
    let idx = workouts.findIndex(w => w.id === workoutId);
    if (idx === -1) return '#6b6b80'; // fallback for deleted workouts
    const WORKOUT_COLORS = [
      '#38bdf8', '#10b981', '#f43f5e', '#8b5cf6', '#f59e0b', '#14b8a6', '#ec4899', '#84cc16'
    ];
    return WORKOUT_COLORS[idx % WORKOUT_COLORS.length];
  }

  return {
    icon,
    showToast,
    showModal,
    closeModal,
    confirmModal,
    compressImage,
    generateThumbnail,
    readFileAsDataUrl,
    formatTime,
    getGreeting,
    getWorkoutColor,
    tripleActionModal,
  };
})();

/* ============================================
   PhysioTrainer â€” Storage Module
   Gestione persistenza dati via IndexedDB (fallback localStorage)
   ============================================ */

const Storage = (() => {
  const KEYS = {
    exercises: 'pt_exercises',
    workouts: 'pt_workouts',
    sessions: 'pt_sessions',
    settings: 'pt_settings',
  };

  // --- IndexedDB Setup ---
  const IDB_NAME = 'PhysioTrainerLocalDB';
  const IDB_VERSION = 1;
  const IDB_STORE = 'appData';

  let _db = null;
  let inMemoryData = {
    exercises: [],
    workouts: [],
    sessions: [],
    settings: {}
  };

  function openDatabase() {
    return new Promise(function (resolve, reject) {
      if (_db) { resolve(_db); return; }
      const request = indexedDB.open(IDB_NAME, IDB_VERSION);
      request.onupgradeneeded = function (e) {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
          db.createObjectStore(IDB_STORE);
        }
      };
      request.onsuccess = function (e) {
        _db = e.target.result;
        resolve(_db);
      };
      request.onerror = function (e) {
        console.warn('IndexedDB open error:', e.target.error);
        reject(e.target.error);
      };
    });
  }

  function readFromIDB() {
    return openDatabase().then(function (db) {
      return new Promise(function (resolve, reject) {
        const tx = db.transaction(IDB_STORE, 'readonly');
        const store = tx.objectStore(IDB_STORE);
        const request = store.get('physiodata');
        request.onsuccess = function () { resolve(request.result || null); };
        request.onerror = function () { reject(request.error); };
      });
    });
  }

  function writeToIDB(data) {
    return openDatabase().then(function (db) {
      return new Promise(function (resolve, reject) {
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        const request = store.put(data, 'physiodata');
        request.onsuccess = function () { resolve(); };
        request.onerror = function () { reject(request.error); };
      });
    });
  }

  function loadData() {
    return readFromIDB().then(function(data) {
      if (data && data.exercises) {
        inMemoryData = data;
      } else {
        // Legacy migration
        try {
          if (localStorage.getItem(KEYS.exercises)) {
            inMemoryData.exercises = JSON.parse(localStorage.getItem(KEYS.exercises) || '[]');
            inMemoryData.workouts = JSON.parse(localStorage.getItem(KEYS.workouts) || '[]');
            inMemoryData.sessions = JSON.parse(localStorage.getItem(KEYS.sessions) || '[]');
            inMemoryData.settings = JSON.parse(localStorage.getItem(KEYS.settings) || '{}');
            
            writeToIDB(inMemoryData).then(function() {
              localStorage.removeItem(KEYS.exercises);
              localStorage.removeItem(KEYS.workouts);
              localStorage.removeItem(KEYS.sessions);
              localStorage.removeItem(KEYS.settings);
            });
          }
        } catch(e) { console.warn(e); }
      }
    }).catch(function(err) {
      console.warn('IDB load failed, fallback to localStorage', err);
      try {
        if (localStorage.getItem(KEYS.exercises)) {
            inMemoryData.exercises = JSON.parse(localStorage.getItem(KEYS.exercises) || '[]');
            inMemoryData.workouts = JSON.parse(localStorage.getItem(KEYS.workouts) || '[]');
            inMemoryData.sessions = JSON.parse(localStorage.getItem(KEYS.sessions) || '[]');
            inMemoryData.settings = JSON.parse(localStorage.getItem(KEYS.settings) || '{}');
        }
      } catch(e) {}
    });
  }

  function clearAllData() {
    inMemoryData = { exercises: [], workouts: [], sessions: [], settings: {} };
    writeToIDB(inMemoryData).catch(function() {
      localStorage.removeItem(KEYS.exercises);
      localStorage.removeItem(KEYS.workouts);
      localStorage.removeItem(KEYS.sessions);
      localStorage.removeItem(KEYS.settings);
    });
  }

  // --- Helpers ---
  function _get(key) {
    if (key === KEYS.exercises) return inMemoryData.exercises;
    if (key === KEYS.workouts) return inMemoryData.workouts;
    if (key === KEYS.sessions) return inMemoryData.sessions;
    return [];
  }

  function _set(key, value) {
    if (key === KEYS.exercises) inMemoryData.exercises = value;
    else if (key === KEYS.workouts) inMemoryData.workouts = value;
    else if (key === KEYS.sessions) inMemoryData.sessions = value;
    
    writeToIDB(inMemoryData).catch(function() {
      localStorage.setItem(key, JSON.stringify(value));
    });
    if (typeof window.triggerAutoSync === 'function') {
      window.triggerAutoSync();
    }
    return true;
  }

  function _generateId(prefix) {
    return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
  }

  // --- Exercises ---
  function getExercises() {
    return _get(KEYS.exercises);
  }

  function getExercise(id) {
    return getExercises().find(ex => ex.id === id) || null;
  }

  function saveExercise(exercise) {
    const exercises = getExercises();
    const now = new Date().toISOString();

    if (exercise.id) {
      // Update
      const index = exercises.findIndex(ex => ex.id === exercise.id);
      if (index !== -1) {
        exercises[index] = { ...exercises[index], ...exercise, updatedAt: now };
        _set(KEYS.exercises, exercises);
        return exercises[index];
      }
    }

    // Create
    const newExercise = {
      id: _generateId('ex'),
      name: exercise.name || 'Unnamed Exercise',
      description: exercise.description || '',
      mediaType: exercise.mediaType || 'none',
      mediaData: exercise.mediaData || null,
      mediaThumbnail: exercise.mediaThumbnail || null,
      mediaSource: exercise.mediaSource || null,
      createdAt: now,
      updatedAt: now,
    };
    exercises.push(newExercise);
    _set(KEYS.exercises, exercises);
    return newExercise;
  }

  function deleteExercise(id) {
    let exercises = getExercises();
    const before = exercises.length;
    exercises = exercises.filter(ex => ex.id !== id);
    if (exercises.length < before) {
      _set(KEYS.exercises, exercises);

      // Remove from all workouts that reference this exercise
      const workouts = getWorkouts();
      let workoutsChanged = false;
      workouts.forEach(wk => {
        const idx = wk.exerciseIds.indexOf(id);
        if (idx !== -1) {
          wk.exerciseIds.splice(idx, 1);
          wk.updatedAt = new Date().toISOString();
          workoutsChanged = true;
        }
      });
      if (workoutsChanged) {
        _set(KEYS.workouts, workouts);
      }
      return true;
    }
    return false;
  }

  function getWorkoutsUsingExercise(exerciseId) {
    return getWorkouts().filter(wk => wk.exerciseIds.includes(exerciseId));
  }

  // --- Workouts ---
  function getWorkouts() {
    return _get(KEYS.workouts);
  }

  function getWorkout(id) {
    return getWorkouts().find(wk => wk.id === id) || null;
  }

  function saveWorkout(workout) {
    const workouts = getWorkouts();
    const now = new Date().toISOString();

    if (workout.id) {
      const index = workouts.findIndex(wk => wk.id === workout.id);
      if (index !== -1) {
        workouts[index] = { ...workouts[index], ...workout, updatedAt: now };
        _set(KEYS.workouts, workouts);
        return workouts[index];
      }
    }

    const newWorkout = {
      id: _generateId('wk'),
      name: workout.name || 'Unnamed Workout',
      exerciseIds: workout.exerciseIds || [],
      createdAt: now,
      updatedAt: now,
    };
    workouts.push(newWorkout);
    _set(KEYS.workouts, workouts);
    return newWorkout;
  }

  function deleteWorkout(id) {
    let workouts = getWorkouts();
    const before = workouts.length;
    workouts = workouts.filter(wk => wk.id !== id);
    if (workouts.length < before) {
      _set(KEYS.workouts, workouts);
      return true;
    }
    return false;
  }

  // --- Sessions ---
  function getSessions() {
    return _get(KEYS.sessions);
  }

  function saveSession(session) {
    const sessions = getSessions();
    const newSession = {
      id: _generateId('ws'),
      workoutId: session.workoutId,
      date: new Date().toISOString(),
      exercises: session.exercises || [],
      completed: session.completed || false,
    };
    sessions.push(newSession);
    _set(KEYS.sessions, sessions);
    return newSession;
  }

  function deleteSession(id) {
    let sessions = getSessions();
    const before = sessions.length;
    sessions = sessions.filter(s => s.id !== id);
    if (sessions.length < before) {
      _set(KEYS.sessions, sessions);
      return true;
    }
    return false;
  }

  function deleteSessionsByWorkout(workoutId) {
    let sessions = getSessions();
    const before = sessions.length;
    sessions = sessions.filter(s => s.workoutId !== workoutId);
    if (sessions.length < before) {
      _set(KEYS.sessions, sessions);
      return true;
    }
    return false;
  }

  // --- Settings ---
  function getSettings() {
    return inMemoryData.settings || {};
  }

  function getSetting(key) {
    return getSettings()[key] || null;
  }

  function saveSetting(key, value) {
    const settings = getSettings();
    if (value === null) {
      delete settings[key];
    } else {
      settings[key] = value;
    }
    inMemoryData.settings = settings;
    writeToIDB(inMemoryData).catch(function() {
      localStorage.setItem(KEYS.settings, JSON.stringify(settings));
    });
    return true;
  }

  // --- Utility ---
  function getStorageUsage() {
    let total = JSON.stringify(inMemoryData).length * 2;
    return {
      usedBytes: total,
      usedMB: (total / (1024 * 1024)).toFixed(2),
      limitMB: 50,
      percentUsed: Math.round((total / (50 * 1024 * 1024)) * 100),
    };
  }

  function exportData() {
    return JSON.stringify({
      exercises: getExercises(),
      workouts: getWorkouts(),
      sessions: getSessions(),
      exportedAt: new Date().toISOString(),
    });
  }

  function importData(jsonString) {
    try {
      const data = JSON.parse(jsonString);
      if (data.exercises) _set(KEYS.exercises, data.exercises);
      if (data.workouts) _set(KEYS.workouts, data.workouts);
      if (data.sessions) _set(KEYS.sessions, data.sessions);
      return true;
    } catch (e) {
      console.error('Import error:', e);
      return false;
    }
  }

  return {
    loadData,
    clearAllData,
    getExercises,
    getExercise,
    saveExercise,
    deleteExercise,
    getWorkoutsUsingExercise,
    getWorkouts,
    getWorkout,
    saveWorkout,
    deleteWorkout,
    getSessions,
    saveSession,
    deleteSession,
    deleteSessionsByWorkout,
    getSetting,
    saveSetting,
    getStorageUsage,
    exportData,
    importData,
  };
})();

const Exercises = (() => {

  // --- Render: Exercise list view ---
  function renderList() {
    const exercises = Storage.getExercises();

    let html = `
      <div class="header">
        <div class="header-left">
          <button class="btn-back" onclick="App.goBack('#home')">${UI.icon('arrowLeft')}</button>
          <span class="header-title">My Exercises</span>

        </button>

    if (exercises.length === 0) {
      html += `
        <div class="empty-state">

          <div class="empty-state-title">No exercises</div>
          <div class="empty-state-text">Create your first exercise to get started</div>
          <button class="btn btn-primary btn-lg" onclick="App.navigate('#exercise/new')">
            ${UI.icon('plus')} Create Exercise
          </button>
        </div>
      `;
    } else {
      html += `
        <div class="search-bar">
          ${UI.icon('search')}
          <input type="text" id="exercise-search" placeholder="Search exercises..." oninput="Exercises.filterList(this.value)">
        </div>
        <div id="exercise-list-container">
      `;

      exercises.forEach((ex, i) => {
        html += renderExerciseCard(ex, i);
      });

      html += `</div>`;
    }

    html += `</div>`;
    return html;
  }

  function renderExerciseCard(ex, index) {
    const thumbHtml = ex.mediaThumbnail
      ? `<img src="${ex.mediaThumbnail}" alt="${ex.name}">`
      : ex.mediaData && ex.mediaType === 'image'
      ? `<img src="${ex.mediaData}" alt="${ex.name}">`
      : `<span class="placeholder-icon">${UI.icon('activity')}</span>`;

    const mediaBadge = ex.mediaType === 'image'
      ? `<span class="badge badge-accent">Image</span>`
      : ex.mediaType === 'video'
      ? `<span class="badge badge-teal">Video</span>`
      : `<span class="badge badge-muted">No media</span>`;

    return `
      <div class="card exercise-card stagger-item" data-exercise-name="${ex.name.toLowerCase()}" onclick="App.navigate('#exercise/${ex.id}')">
        <div class="card-row">
          <div class="exercise-thumb">${thumbHtml}</div>
          <div class="card-body">
            <div class="card-title">${ex.name}</div>
            <div class="flex gap-sm" style="margin-top:4px;">${mediaBadge}</div>
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="btn btn-icon btn-secondary small" onclick="Exercises.confirmDelete('${ex.id}')" title="Delete">
              ${UI.icon('trash')}
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function filterList(query) {
    const cards = document.querySelectorAll('.exercise-card');
    const q = query.toLowerCase().trim();
    cards.forEach(card => {
      const name = card.getAttribute('data-exercise-name');
      card.style.display = name.includes(q) ? '' : 'none';
    });
  }

  // --- Render: Exercise create/edit form ---
  function renderForm(exerciseId) {
    const isEdit = !!exerciseId;
    const exercise = isEdit ? Storage.getExercise(exerciseId) : null;

    if (isEdit && !exercise) {
      return `
        <div class="header">
          <div class="header-left">
            <button class="btn-back" onclick="App.goBack('#exercises')">${UI.icon('arrowLeft')}</button>
            <span class="header-title">Exercise Not Found</span>
          </div>
        </div>
        <div class="main-content"><div class="empty-state">
          <div class="empty-state-icon" style="font-size:3rem; opacity:0.3;">?</div>
          <div class="empty-state-title">Exercise not found</div>
          <button class="btn btn-primary" onclick="App.navigate('#exercises')">Back to list</button>
        </div></div>
      `;
    }

    const title = isEdit ? 'Edit Exercise' : 'New Exercise';
    const name = exercise ? exercise.name : '';
    const mediaHtml = exercise && exercise.mediaData
      ? exercise.mediaType === 'video'
        ? `<video src="${exercise.mediaData}" controls style="width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;"></video>`
        : `<img src="${exercise.mediaData}" alt="${name}" style="width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;">`
      : '';

    const hasMedia = exercise && exercise.mediaData;

    return `
      <div class="header">
        <div class="header-left">
          <button class="btn-back" onclick="App.goBack('#exercises')">${UI.icon('arrowLeft')}</button>
          <span class="header-title">${title}</span>
        </div>
        <button class="btn btn-primary" id="exercise-save-btn" onclick="Exercises.save()">
          ${UI.icon('check')} Save
        </button>
      </div>
      <div class="main-content view-enter">
        <input type="hidden" id="exercise-id" value="${exerciseId || ''}">

        <div class="form-group">
          <label class="form-label">Exercise Name</label>
          <input type="text" class="form-input" id="exercise-name" placeholder="e.g.: Stretching" value="${name}" maxlength="100">
          <div class="form-error hidden" id="name-error">Name is required</div>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="exercise-description" placeholder="Explain how to perform the exercise..." rows="4">${exercise ? (exercise.description || '') : ''}</textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Media</label>
          <div class="media-upload-area ${hasMedia ? 'has-media' : ''}" id="media-preview-area" onclick="Exercises.triggerUpload()">
            ${hasMedia ? mediaHtml : `
              <div class="media-upload-placeholder">
                ${UI.icon('upload')}
                <div class="text-small">Click to upload</div>
              </div>
            `}
          </div>
          <input type="file" class="file-input-hidden" id="media-file-input" accept="image/*,video/*" onchange="Exercises.handleFileSelect(event)">
        </div>

        <div class="media-action-btns">
          <button class="btn btn-secondary" onclick="Exercises.triggerUpload()">
            ${UI.icon('upload')} Upload File
          </button>
          <button class="btn btn-secondary" onclick="Exercises.searchGoogleImages()">
            ${UI.icon('search')} Google Search
          </button>
        </div>

        ${hasMedia ? `
          <div style="margin-top: var(--space-md);">
            <button class="btn btn-danger btn-full" onclick="Exercises.removeMedia()">
              ${UI.icon('trash')} Remove Media
            </button>
          </div>
        ` : ''}
      </div>
    `;
  }

  // --- State for current media ---
  let currentMedia = {
    type: 'none',
    data: null,
    thumbnail: null,
    source: null,
  };

  function initFormMedia(exerciseId) {
    if (exerciseId) {
      const ex = Storage.getExercise(exerciseId);
      if (ex) {
        currentMedia = {
          type: ex.mediaType || 'none',
          data: ex.mediaData,
          thumbnail: ex.mediaThumbnail,
          source: ex.mediaSource,
        };
        return;
      }
    }
    currentMedia = { type: 'none', data: null, thumbnail: null, source: null };
  }

  function triggerUpload() {
    document.getElementById('media-file-input').click();
  }

  async function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const maxSizeMB = file.type.startsWith('video/') ? 5 : 2;
    if (file.size > maxSizeMB * 1024 * 1024) {
      UI.showToast(`File too large! Max ${maxSizeMB}MB.`, 'error');
      return;
    }

    try {
      const area = document.getElementById('media-preview-area');

      if (file.type.startsWith('image/')) {
        const dataUrl = await UI.compressImage(file, 1200, 0.85);
        const thumbnail = await UI.generateThumbnail(dataUrl, 200);
        currentMedia = { type: 'image', data: dataUrl, thumbnail, source: 'upload' };

        area.classList.add('has-media');
        area.innerHTML = `<img src="${dataUrl}" alt="Preview">`;
        area.onclick = null;
      } else if (file.type.startsWith('video/')) {
        const dataUrl = await UI.readFileAsDataUrl(file);
        currentMedia = { type: 'video', data: dataUrl, thumbnail: null, source: 'upload' };

        area.classList.add('has-media');
        area.innerHTML = `<video src="${dataUrl}" controls></video>`;
        area.onclick = null;
      }

      UI.showToast('File uploaded!', 'success');
    } catch (err) {
      console.error('File load error:', err);
      UI.showToast('Error uploading file', 'error');
    }
  }

  function removeMedia() {
    currentMedia = { type: 'none', data: null, thumbnail: null, source: null };
    const area = document.getElementById('media-preview-area');
    area.classList.remove('has-media');
    area.innerHTML = `
      <div class="media-upload-placeholder">
        ${UI.icon('upload')}
        <div class="text-small">Click to upload</div>
      </div>
    `;
    area.onclick = () => Exercises.triggerUpload();
    UI.showToast('Media removed', 'info');
  }

  // --- Google Image Search ---
  function searchGoogleImages() {
    const nameInput = document.getElementById('exercise-name');
    const name = nameInput ? nameInput.value.trim() : '';

    if (!name) {
      UI.showToast('Please enter an exercise name first', 'error');
      return;
    }

    const query = encodeURIComponent(name + ' physiotherapy exercise');
    const url = `https://www.google.com/search?tbm=isch&q=${query}`;
    window.open(url, '_blank');
  }

  // --- Save Exercise ---
  function save() {
    const idInput = document.getElementById('exercise-id');
    const nameInput = document.getElementById('exercise-name');
    const nameError = document.getElementById('name-error');

    const name = nameInput.value.trim();

    if (!name) {
      nameInput.classList.add('error');
      nameError.classList.remove('hidden');
      setTimeout(() => {
        nameInput.classList.remove('error');
      }, 500);
      return;
    }

    nameError.classList.add('hidden');

    const exerciseData = {
      name,
      description: document.getElementById('exercise-description').value,
      mediaType: currentMedia.type,
      mediaData: currentMedia.data,
      mediaThumbnail: currentMedia.thumbnail,
      mediaSource: currentMedia.source,
    };

    if (idInput.value) {
      exerciseData.id = idInput.value;
    }

    Storage.saveExercise(exerciseData);
    UI.showToast(idInput.value ? 'Exercise updated!' : 'Exercise created!', 'success');
    App.navigate('#exercises');
  }

  // --- Delete Exercise ---
  function confirmDelete(id) {
    const exercise = Storage.getExercise(id);
    if (!exercise) return;

    const workoutsUsing = Storage.getWorkoutsUsingExercise(id);
    let message = `Are you sure you want to delete the exercise "${exercise.name}"?`;
    if (workoutsUsing.length > 0) {
      const names = workoutsUsing.map(w => w.name).join(', ');
      message += `<br><br><span style="color: var(--warning);">This exercise is used in: ${names}</span><br>It will be removed from these workouts.`;
    }

    UI.confirmModal('Delete Exercise', message, () => {
      Storage.deleteExercise(id);
      UI.showToast('Exercise deleted', 'success');
      App.navigate('#exercises');
    });
  }

  return {
    renderList,
    renderForm,
    initFormMedia,
    filterList,
    triggerUpload,
    handleFileSelect,
    removeMedia,
    searchGoogleImages,
    save,
    confirmDelete,
  };
})();

const Workouts = (() => {

  // --- Render: Workout list view ---
  function renderList() {

  // --- Render: Workout create/edit form ---
  function renderForm(workoutId) {

    const workout = isEdit ? Storage.getWorkout(workoutId) : null;

    if (isEdit && !workout) {
      return `
        <div class="header">
          <div class="header-left">
            <button class="btn-back" onclick="App.goBack('#workouts')">${UI.icon('arrowLeft')}</button>
            <span class="header-title">Workout not found</span>
          </div>
        </div>
        <div class="main-content"><div class="empty-state">
          <div class="empty-state-icon">Â¤Â·</div>
          <div class="empty-state-title">Workout not found</div>
          <button class="btn btn-primary" onclick="App.navigate('#workouts')">Back to list</button>
        </div></div>
      `;
    }

    selectedExerciseIds = workout ? [...workout.exerciseIds] : [];
    const title = isEdit ? 'Edit Workout' : 'New Workout';
    const name = workout ? workout.name : '';

    let html = `
      <div class="header">
        <div class="header-left">
          <button class="btn-back" onclick="App.goBack('#workouts')">${UI.icon('arrowLeft')}</button>
          <span class="header-title">${title}</span>
        </div>
        <button class="btn btn-primary" id="workout-save-btn" onclick="Workouts.save()">
          ${UI.icon('check')} Save
        </button>
      </div>
      <div class="main-content view-enter">
        <input type="hidden" id="workout-id" value="${workoutId || ''}">

        <div class="form-group">
          <label class="form-label">Workout Name</label>
          <input type="text" class="form-input" id="workout-name" placeholder="E.g.: Morning Knee Session" value="${name}" maxlength="100">
          <div class="form-error hidden" id="wk-name-error">Name is required</div>
        </div>

        <div class="form-group">
          <div class="flex-between mb-md">
            <label class="form-label" style="margin-bottom:0;">Selected Exercises (<span id="selected-count">${selectedExerciseIds.length}</span>)</label>
          </div>
          <div id="selected-exercises-list">
            ${renderSelectedExercises()}
          </div>
          <div class="form-error hidden" id="wk-exercises-error">Please select at least one exercise</div>
        </div>

        <button class="btn btn-secondary btn-full btn-lg" onclick="Workouts.showExerciseSelector()">
          ${UI.icon('plus')} Add Exercises
        </button>
      </div>
    `;

    return html;
  }

  function renderSelectedExercises() {
    if (selectedExerciseIds.length === 0) {
      return `
        <div class="empty-state" style="padding: var(--space-lg);">
          <div class="empty-state-icon" style="font-size:2rem;">${UI.icon('clipboard')}</div>
          <div class="empty-state-text">No exercises selected</div>
        </div>
      `;
    }

    let html = '<ul class="sortable-list">';
    selectedExerciseIds.forEach((id, index) => {
      const ex = Storage.getExercise(id);
      if (!ex) return;
      html += `
        <li class="sortable-item stagger-item">
          <div class="flex-center sortable-handle" title="Drag to reorder" style="cursor: grab; padding: 0 var(--space-sm);">
            ${UI.icon('grip')}
          </div>
          <span class="play-exercise-number">${index + 1}</span>
          <span class="sortable-name">${ex.name}</span>
          <div class="flex gap-sm">
            ${index > 0 ? `<button class="btn btn-icon small btn-secondary" onclick="Workouts.moveExercise(${index}, -1)" title="Move up">${UI.icon('arrowUp')}</button>` : ''}
            ${index < selectedExerciseIds.length - 1 ? `<button class="btn btn-icon small btn-secondary" onclick="Workouts.moveExercise(${index}, 1)" title="Move down">${UI.icon('arrowDown')}</button>` : ''}
            <button class="btn btn-icon small btn-minimal" onclick="Workouts.removeExercise(${index})" title="Remove">${UI.icon('trash')}</button>
          </div>
        </li>
      `;
    });
    html += '</ul>';
    return html;
  }

  function refreshSelectedList() {
    const container = document.getElementById('selected-exercises-list');
    if (!container) return;
    
    container.innerHTML = renderSelectedExercises();
    
    const countEl = document.getElementById('selected-count');
    if (countEl) countEl.textContent = selectedExerciseIds.length;

    // --- Initialize SortableJS for better mobile support ---
    const el = container.querySelector('.sortable-list');
    if (el && typeof Sortable !== 'undefined') {
      Sortable.create(el, {
        handle: '.sortable-handle',
        animation: 200,
        ghostClass: 'sortable-ghost',
        onEnd: (evt) => {
          const item = selectedExerciseIds.splice(evt.oldIndex, 1)[0];
          selectedExerciseIds.splice(evt.newIndex, 0, item);
          // Update the index display numbers manually to avoid UI flash
          const numbers = el.querySelectorAll('.play-exercise-number');
          numbers.forEach((n, i) => n.textContent = i + 1);
        }
      });
    }
  }

  function moveExercise(index, direction) {
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= selectedExerciseIds.length) return;
    const temp = selectedExerciseIds[index];
    selectedExerciseIds[index] = selectedExerciseIds[newIndex];
    selectedExerciseIds[newIndex] = temp;
    refreshSelectedList();
  }

  function removeExercise(index) {
    selectedExerciseIds.splice(index, 1);
    refreshSelectedList();
  }

  // --- Exercise Selector Modal ---
  function showExerciseSelector() {
    const allExercises = Storage.getExercises();

    if (allExercises.length === 0) {
      UI.showToast('No exercises available. Create one first!', 'error');
      return;
    }

    let listItems = '';
    allExercises.forEach(ex => {
      const isChecked = selectedExerciseIds.includes(ex.id);
      listItems += `
        <li class="checkbox-item ${isChecked ? 'checked' : ''}" data-id="${ex.id}" data-name="${ex.name.toLowerCase()}" onclick="Workouts.toggleExerciseSelection(this, '${ex.id}')">
          <div class="checkbox-custom"></div>
          <span class="checkbox-label">${ex.name}</span>
        </li>
      `;
    });

    const content = `
      <div class="search-bar" style="margin-bottom: var(--space-md);">
        ${UI.icon('search')}
        <input type="text" placeholder="Search exercises..." oninput="Workouts.filterSelector(this.value)">
      </div>
      <ul class="checkbox-list" id="exercise-selector-list">
        ${listItems}
      </ul>
      <div style="margin-top: var(--space-lg);">
        <button class="btn btn-primary btn-full btn-lg" onclick="Workouts.confirmSelection()">
          ${UI.icon('check')} Confirm Selection
        </button>
      </div>
    `;

    UI.showModal('Select Exercises', content);
  }

  function toggleExerciseSelection(element, exerciseId) {
    element.classList.toggle('checked');
  }

  function filterSelector(query) {
    const items = document.querySelectorAll('#exercise-selector-list .checkbox-item');
    const q = query.toLowerCase().trim();
    items.forEach(item => {
      const name = item.getAttribute('data-name');
      item.style.display = name.includes(q) ? '' : 'none';
    });
  }

  function confirmSelection() {
    const checkedItems = document.querySelectorAll('#exercise-selector-list .checkbox-item.checked');
    selectedExerciseIds = [];
    checkedItems.forEach(item => {
      selectedExerciseIds.push(item.getAttribute('data-id'));
    });
    refreshSelectedList();
    UI.closeModal();
    UI.showToast(`${selectedExerciseIds.length} exercise${selectedExerciseIds.length === 1 ? '' : 's'} selected`, 'success');
  }

  // --- Save Workout ---
  function save() {
    const idInput = document.getElementById('workout-id');
    const nameInput = document.getElementById('workout-name');
    const nameError = document.getElementById('wk-name-error');
    const exError = document.getElementById('wk-exercises-error');

    const name = nameInput.value.trim();
    let hasError = false;

    if (!name) {
      nameInput.classList.add('error');
      nameError.classList.remove('hidden');
      setTimeout(() => nameInput.classList.remove('error'), 500);
      hasError = true;
    } else {
      nameError.classList.add('hidden');
    }

    if (selectedExerciseIds.length === 0) {
      exError.classList.remove('hidden');
      hasError = true;
    } else {
      exError.classList.add('hidden');
    }

    if (hasError) return;

    const workoutData = {
      name,
      exerciseIds: [...selectedExerciseIds],
    };

    if (idInput.value) {
      workoutData.id = idInput.value;
    }

    Storage.saveWorkout(workoutData);
    UI.showToast(idInput.value ? 'Workout updated!' : 'Workout created!', 'success');
    App.navigate('#workouts');
  }

  // --- Delete Workout ---
  function confirmDelete(id) {
    const workout = Storage.getWorkout(id);
    if (!workout) return;

    UI.confirmModal('Delete Workout',
      `Are you sure you want to delete the workout "${workout.name}"?<br>This action cannot be undone.`,
      () => {
        Storage.deleteWorkout(id);
        UI.showToast('Workout deleted', 'success');
        App.navigate('#workouts');
      }
    );
  }

  return {
    renderList,
    renderForm,
    showExerciseSelector,
    toggleExerciseSelection,
    filterSelector,
    confirmSelection,
    moveExercise,
    removeExercise,
    save,
    confirmDelete,
  };
})();
