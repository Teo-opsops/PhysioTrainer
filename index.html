          <div class="empty-state-title">Workout not found</div>
          <button class="btn btn-primary" onclick="App.navigate('#workouts')">Back to workouts</button>
        </div></div>
      `;
    }

    currentWorkoutId = workoutId;
    if (!sessionData[workoutId]) {
      sessionData[workoutId] = {};
    }

    let html = `
      <div class="header">
        <div class="header-left">
          <button class="btn-back" onclick="Player.exitWorkout()">${UI.icon('arrowLeft')}</button>
          <span class="header-title">${workout.name}</span>
        </div>
      </div>
      <div class="main-content view-enter">
        <p class="text-secondary mb-lg">Select an exercise to start</p>
        <div class="play-exercise-list">
    `;

    workout.exerciseIds.forEach((exId, index) => {
      const ex = Storage.getExercise(exId);
      if (!ex) return;

      const thumbHtml = ex.mediaThumbnail
        ? `<img src="${ex.mediaThumbnail}" alt="${ex.name}">`
        : ex.mediaData && ex.mediaType === 'image'
        ? `<img src="${ex.mediaData}" alt="${ex.name}">`
        : `<span class="placeholder-icon">&#9899;</span>`;

      const exSession = sessionData[workoutId]?.[exId];
      const setsInfo = exSession && exSession.sets.length > 0
        ? `<span class="badge badge-success">${exSession.sets.length} set${exSession.sets.length === 1 ? '' : 's'} completed</span>`
        : `<span class="card-subtitle">Tap to start</span>`;

      html += `
        <div class="card stagger-item" onclick="App.navigate('#play/${workoutId}/${exId}')">
          <div class="card-row">
            <span class="play-exercise-number">${index + 1}</span>
            <div class="exercise-thumb">${thumbHtml}</div>
            <div class="card-body">
              <div class="card-title">${ex.name}</div>
              ${setsInfo}
            </div>
            <div class="card-arrow">${UI.icon('arrowRight')}</div>
          </div>
        </div>
      `;
    });

    html += `
        </div>
      </div>
    `;

    return html;
  }

  // --- Render: Exercise Player ---
  function renderPlayer(workoutId, exerciseId) {
    const workout = Storage.getWorkout(workoutId);
    const exercise = Storage.getExercise(exerciseId);

    if (!workout || !exercise) {
      return `
        <div class="header">
          <div class="header-left">
            <button class="btn-back" onclick="App.goBack('#play/${workoutId}')">${UI.icon('arrowLeft')}</button>
            <span class="header-title">Not Found</span>
          </div>
        </div>
        <div class="main-content"><div class="empty-state">
          <div class="empty-state-icon">${UI.icon('alertCircle')}</div>
          <div class="empty-state-title">Data not found</div>
        </div></div>
      `;
    }

    currentWorkoutId = workoutId;
    currentExerciseId = exerciseId;

    // Restore session data
    if (!sessionData[workoutId]) sessionData[workoutId] = {};
    if (!sessionData[workoutId][exerciseId]) {
      sessionData[workoutId][exerciseId] = { sets: [], totalTime: 0 };
    }

    // Reset timer and reps for this exercise
    stopTimer();
    timerSeconds = 0;
    timerRunning = false;
    currentReps = 0;
    completedSets = [...sessionData[workoutId][exerciseId].sets];

    // Media section
    let mediaHtml = '';
    if (exercise.mediaData && exercise.mediaType === 'image') {
      mediaHtml = `<img src="${exercise.mediaData}" alt="${exercise.name}">`;
    } else if (exercise.mediaData && exercise.mediaType === 'video') {
      mediaHtml = `<video src="${exercise.mediaData}" controls playsinline></video>`;
    } else {
      mediaHtml = `<span class="placeholder-icon" style="font-size:3rem;color:var(--text-muted);">&#9899;</span>`;
    }

    // Sets history
    const setsHistoryHtml = renderSetPills();

    return `
      <div class="header">
        <div class="header-left">
          <button class="btn-back" onclick="Player.backToList()">${UI.icon('arrowLeft')}</button>
          <span class="header-title">${exercise.name}</span>
        </div>
      </div>
      <div class="main-content view-enter">
        <!-- Collapsible sections for Media & Description -->
        <div class="player-collapsibles mb-md">
          <!-- Image/Video Section -->
          <div class="player-collapsible-item">
            <div class="player-collapsible-header" onclick="Player.toggleCollapsible('media')">
              <span>Image</span>
              <span id="collapsible-media-icon" class="collapsible-icon">${UI.icon('chevronDown')}</span>
            </div>
            <div id="collapsible-media-content" class="player-collapsible-content hidden">
              ${mediaHtml}
            </div>
          </div>

          <!-- Description Section -->
          <div class="player-collapsible-item">
            <div class="player-collapsible-header" onclick="Player.toggleCollapsible('desc')">
              <span>Description</span>
              <span id="collapsible-desc-icon" class="collapsible-icon">${UI.icon('chevronDown')}</span>
            </div>
            <div id="collapsible-desc-content" class="player-collapsible-content hidden">
              <p>${exercise.description || 'No description provided.'}</p>
            </div>
          </div>
        </div>

        <!-- Timer + Reps side by side -->
        <div class="player-blocks-row">
          <!-- Timer Block -->
          <div class="player-block">
            <div class="player-block-header">
              ${UI.icon('clock')}
              <span>Timer</span>
            </div>
            <div class="timer-display" id="timer-display">00:00</div>
            
            <div class="timer-adjuster">
              <div class="timer-adjust-row">
                <button class="btn-timer-adj" onclick="Player.addTimerSeconds(-30)" title="-30 seconds">-30s</button>
                <button class="btn-timer-adj" onclick="Player.addTimerSeconds(-1)" title="-1 second">-1s</button>
                <button class="btn-timer-adj highlight" onclick="Player.addTimerSeconds(1)" title="+1 second">+1s</button>
                <button class="btn-timer-adj highlight" onclick="Player.addTimerSeconds(30)" title="+30 seconds">+30s</button>
              </div>
            </div>

            <div class="timer-main-controls">
              <button class="btn btn-primary flex-1" id="timer-play-btn" onclick="Player.toggleTimer()">
                ${UI.icon('play')} Start
              </button>
            </div>
          </div>

          <!-- Reps Block -->
          <div class="player-block">
            <div class="player-block-header">
              ${UI.icon('hash')}
              <span>Reps</span>
            </div>

            <div class="reps-display" id="reps-display">0</div>

            <div class="reps-controls">
              <button class="btn-rep btn-rep-minus" onclick="Player.decrementReps()" aria-label="Minus rep">
                &minus;
              </button>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <button class="btn-rep btn-rep-plus" style="width: 48px; height: 32px; font-size: 14px;" onclick="Player.addReps(5)" aria-label="Add 5 reps">+5</button>
              </div>
              <button class="btn-rep btn-rep-plus" onclick="Player.incrementReps()" aria-label="Plus rep">
                +
              </button>
            </div>
          </div>
        </div>

        <!-- Complete Set button (full width below both blocks) -->
        <button class="btn btn-success btn-full btn-lg" onclick="Player.completeSet()" style="margin-bottom: var(--space-lg);">
          ${UI.icon('check')} Complete Set
        </button>

        <!-- Sets history -->
        <div class="player-block" id="sets-history-block" ${completedSets.length === 0 ? 'style="display:none;"' : ''}>
          <div class="player-block-header">
            ${UI.icon('clipboard')}
            <span>Completed Sets</span>
          </div>
          <div id="sets-history">
            ${setsHistoryHtml}
          </div>
        </div>
      </div>
    `;
  }

  function renderSetPills() {
    if (completedSets.length === 0) return '';

    let html = '<div class="sets-table">';
    completedSets.forEach((set, i) => {
      html += `
        <div class="set-row stagger-item">
          <span class="set-number">Set ${i + 1}</span>
          <span class="set-detail">${set.reps} rep</span>
          <span class="set-detail">${UI.formatTime(set.time)}</span>
          <button class="btn btn-icon btn-secondary small" onclick="Player.deleteCompletedSet(${i})" style="width:28px;height:28px;margin-left:auto;">
            ${UI.icon('trash')}
          </button>
        </div>
      `;
    });
    html += '</div>';
    return html;
  }

  function deleteCompletedSet(index) {
    completedSets.splice(index, 1);
    
    // Save to session
    if (currentWorkoutId && currentExerciseId) {
      if (!sessionData[currentWorkoutId]) sessionData[currentWorkoutId] = {};
      if (!sessionData[currentWorkoutId][currentExerciseId]) {
        sessionData[currentWorkoutId][currentExerciseId] = { sets: [], totalTime: 0 };
      }
      sessionData[currentWorkoutId][currentExerciseId].sets = [...completedSets];
      sessionData[currentWorkoutId][currentExerciseId].totalTime =
        completedSets.reduce((sum, s) => sum + s.time, 0);
    }
    
    // Update UI
    const historyBlock = document.getElementById('sets-history-block');
    const historyDiv = document.getElementById('sets-history');
    if (completedSets.length === 0) {
      if (historyBlock) historyBlock.style.display = 'none';
      if (historyDiv) historyDiv.innerHTML = '';
    } else {
      if (historyDiv) historyDiv.innerHTML = renderSetPills();
    }
  }

  // --- Timer functions ---
  function toggleTimer() {
    if (timerRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  }

  function startTimer() {
    if (timerRunning) return;
    if (timerSeconds <= 0) {
      UI.showToast('Please add time first', 'error');
      return;
    }
    timerRunning = true;

    const display = document.getElementById('timer-display');
    const btn = document.getElementById('timer-play-btn');
    if (display) display.classList.add('running');
    if (btn) btn.innerHTML = `${UI.icon('pause')} Pause`;

    timerInterval = setInterval(() => {
      if (timerSeconds <= 0) {
        stopTimer();
        playBeep();
        // Auto complete
        completeSet(true);
        return;
      }
      timerSeconds--;
      updateTimerDisplay();
    }, 1000);
  }

  function pauseTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
    timerInterval = null;

    const display = document.getElementById('timer-display');
    const btn = document.getElementById('timer-play-btn');
    if (display) display.classList.remove('running');
    if (btn) btn.innerHTML = `${UI.icon('play')} Play`;
  }

  function addTimerSeconds(seconds) {
    if (timerSeconds + seconds < 0) {
      timerSeconds = 0;
    } else {
      timerSeconds += seconds;
    }
    // Track initial for the set
    timerInitialSeconds = timerSeconds;
    updateTimerDisplay();
  }

  function playBeep() {
    const customSound = Storage.getSetting('timerSound');
    const audioSrc = customSound ? customSound : 'sound.aac';
    const audio = new Audio(audioSrc);
    audio.play().catch(e => {
      console.error('Audio play error:', e);
      if (!customSound) synthesizeBeep(); // fallback
    });
  }

  function synthesizeBeep() {
    try {
      const AppContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AppContext();
      
      const playTone = (freq, startTime, duration) => {
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.1);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
      };

      // Friendly "Ding-Ding" chime
      const now = ctx.currentTime;
      playTone(523.25, now, 0.8);        // C5
      playTone(659.25, now + 0.15, 0.8); // E5
      
      if (ctx.state === 'suspended') ctx.resume();
    } catch (e) {
      console.warn('Web Audio API error', e);
    }
  }

  function stopTimer() {
    pauseTimer();
  }

  function resetTimer() {
    stopTimer();
    timerSeconds = 0;
    updateTimerDisplay();
  }

  function updateTimerDisplay() {
    const display = document.getElementById('timer-display');
    if (display) {
      display.textContent = UI.formatTime(timerSeconds);
    }
  }

  function toggleCollapsible(type) {
    const el = document.getElementById(`collapsible-${type}-content`);
    const icon = document.getElementById(`collapsible-${type}-icon`);
    if (el && icon) {
      const isHidden = el.classList.contains('hidden');
      if (isHidden) {
        el.classList.remove('hidden');
        icon.innerHTML = UI.icon('chevronUp');
      } else {
        el.classList.add('hidden');
        icon.innerHTML = UI.icon('chevronDown');
      }
    }
  }

  // --- Reps functions ---
  function incrementReps() {
    addReps(1);
  }
  
  function addReps(n) {
    currentReps += n;
    updateRepsDisplay(true);
  }

  function decrementReps() {
    if (currentReps > 0) {
      currentReps--;
      updateRepsDisplay(true);
    }
  }

  function updateRepsDisplay(animate = false) {
    const display = document.getElementById('reps-display');
    if (display) {
      display.textContent = currentReps;
      if (animate) {
        display.classList.remove('pop');
        void display.offsetWidth;
        display.classList.add('pop');
      }
    }
  }

  // --- Complete Set: saves reps + time, then auto-resets timer ---
  function completeSet(auto = false) {
    if (!auto && currentReps === 0) {
      UI.showToast('Add at least one rep!', 'error');
      return;
    }

    // Save set with reps AND total time intended for the set
    const setData = { reps: currentReps, time: timerInitialSeconds };
    completedSets.push(setData);

    // Save to session
    if (currentWorkoutId && currentExerciseId) {
      if (!sessionData[currentWorkoutId]) sessionData[currentWorkoutId] = {};
      if (!sessionData[currentWorkoutId][currentExerciseId]) {
        sessionData[currentWorkoutId][currentExerciseId] = { sets: [], totalTime: 0 };
      }
      sessionData[currentWorkoutId][currentExerciseId].sets = [...completedSets];
      // Accumulate total reps and time
      sessionData[currentWorkoutId][currentExerciseId].totalTime =
        completedSets.reduce((sum, s) => sum + s.time, 0);
    }

    const durationTxt = UI.formatTime(timerInitialSeconds);
    const toastMsg = auto 
      ? `Set ${completedSets.length} auto-completed! (${currentReps} rep, ${durationTxt})`
      : `Set ${completedSets.length} completed! (${currentReps} rep, ${durationTxt})`;
    
    UI.showToast(toastMsg, 'success');

    // Reset reps to 0
    currentReps = 0;
    updateRepsDisplay(false);

    // Auto-reset timer for next set
    stopTimer();
    timerSeconds = 0;
    timerInitialSeconds = 0;
    updateTimerDisplay();

    // Show sets history block if hidden
    const historyBlock = document.getElementById('sets-history-block');
    if (historyBlock) historyBlock.style.display = '';

    // Update sets history with animation
    const historyDiv = document.getElementById('sets-history');
    if (historyDiv) {
      historyDiv.innerHTML = renderSetPills();
      const rows = historyDiv.querySelectorAll('.set-row');
      if (rows.length > 0) {
        rows[rows.length - 1].classList.add('new');
      }
    }
  }

  // --- Navigation ---
  function backToList() {
    stopTimer();
    if (currentWorkoutId && currentExerciseId) {
      if (!sessionData[currentWorkoutId]) sessionData[currentWorkoutId] = {};
      if (!sessionData[currentWorkoutId][currentExerciseId]) {
        sessionData[currentWorkoutId][currentExerciseId] = { sets: [], totalTime: 0 };
      }
      sessionData[currentWorkoutId][currentExerciseId].totalTime =
        completedSets.reduce((sum, s) => sum + s.time, 0);
    }
    App.goBack(`#play/${currentWorkoutId}`);
  }

  function hasActiveSessionData() {
    const wkData = sessionData[currentWorkoutId];
    return wkData && Object.values(wkData).some(ex => ex.sets.length > 0);
  }

  function exitWorkout() {
    stopTimer();

    if (hasActiveSessionData()) {
      UI.tripleActionModal(
        'Finish Workout',
        'You have recorded sets in this session. What would you like to do?',
        'Save and Exit', 
        () => {
          saveSession();
          App.goBack('#workouts');
        },
        'Exit without saving',
        () => {
          delete sessionData[currentWorkoutId];
          UI.showToast('Session discarded', 'info');
          App.goBack('#workouts');
        },
        'Continue current workout',
        () => {
          // just close
        }
      );
    } else {
      App.goBack('#workouts');
    }
  }

  function saveSession() {
    if (!currentWorkoutId || !sessionData[currentWorkoutId]) return;

    const exercises = [];
    for (const [exId, data] of Object.entries(sessionData[currentWorkoutId])) {
      if (data.sets.length > 0) {
        exercises.push({
          exerciseId: exId,
          setsCount: data.sets.length,
          sets: data.sets.map(s => ({ reps: s.reps, time: s.time })),
          totalReps: data.sets.reduce((sum, s) => sum + s.reps, 0),
          totalTime: data.sets.reduce((sum, s) => sum + s.time, 0),
        });
      }
    }

    if (exercises.length > 0) {
      Storage.saveSession({
        workoutId: currentWorkoutId,
        exercises,
        completed: true,
      });
      UI.showToast('Session saved!', 'success');
    }

    delete sessionData[currentWorkoutId];
  }

  // --- Render: Sessions History ---
  function renderSessions() {
    const sessions = Storage.getSessions();

    let html = `
      <div class="header">
        <div class="header-left">
          <button class="btn-back" onclick="App.goBack('#home')">${UI.icon('arrowLeft')}</button>
          <span class="header-title">Sessions History</span>
        </div>
      </div>
      <div class="main-content view-enter">
        <div class="section-title">Weekly Activity</div>
        <div class="card stagger-item" style="margin-bottom: var(--space-md); padding-bottom: 0;">
          <div style="position:relative; width:100%; height:160px; pointer-events:none;">
            <canvas id="weekly-chart-canvas" style="width:100%; height:100%; display:block;"></canvas>
          </div>
        </div>
        <div class="section-title">Sessions List</div>
    `;

    if (sessions.length === 0) {
      html += `
        <div class="empty-state">
          <div class="empty-state-icon" style="font-size:3rem; opacity:0.3;">${UI.icon('clock')}</div>
          <div class="empty-state-title">No sessions</div>
          <div class="empty-state-text">Your completed sessions will appear here</div>
        </div>
      `;
    } else {
      // Group sessions by workoutId
      const grouped = {};
      sessions.forEach(session => {
        const key = session.workoutId || 'unknown';
        if (!grouped[key]) {
          grouped[key] = [];
        }
        grouped[key].push(session);
      });

      // Render each group
      for (const [workoutId, wSessions] of Object.entries(grouped)) {
        if (wSessions.length === 0) continue;

        const workout = Storage.getWorkout(workoutId);
        const workoutName = workout ? workout.name : 'Deleted Workout';
        const isExpanded = expandedGroups.has(workoutId);

        // Sort sessions in this group by date descending
        wSessions.sort((a, b) => new Date(b.date) - new Date(a.date));

        const wColor = UI.getWorkoutColor(workoutId);

        html += `
          <div class="card stagger-item" style="margin-bottom: var(--space-md); border-left: 4px solid ${wColor};">
            <div class="card-row flex-between" style="cursor: pointer; padding-bottom: 0;" onclick="Player.toggleSessionGroup('${workoutId}')">
              <div style="flex:1;">
                <div class="card-title">${workoutName}</div>
                <div class="text-small text-secondary">${wSessions.length} session${wSessions.length === 1 ? '' : 's'} grouped</div>
              </div>
              <div id="session-icon-${workoutId}">${UI.icon(isExpanded ? 'chevronUp' : 'chevronDown')}</div>
            </div>
            
            <div id="session-group-${workoutId}" class="${isExpanded ? '' : 'hidden'}" style="margin-top: var(--space-md); border-top: 1px solid var(--glass-border); padding-top: var(--space-md);">
              <div class="flex-between mb-md">
                <span class="text-secondary text-small" style="font-weight: 600;">Sessions List</span>
                <button class="btn btn-danger small" onclick="Player.confirmDeleteSessionsGroup('${workoutId}'); event.stopPropagation();">
                  ${UI.icon('trash')} Delete All
                </button>
              </div>
        `;

        wSessions.forEach((session, idx) => {
          const date = new Date(session.date);
          const dateStr = date.toLocaleDateString('en-US', {
            day: 'numeric', month: 'long', year: 'numeric'
          });
          const timeStr = date.toLocaleTimeString('en-US', {
            hour: '2-digit', minute: '2-digit'
          });

          // Calculate totals
          const totalSets = session.exercises.reduce((sum, ex) => sum + (ex.setsCount || ex.sets?.length || 0), 0);
          const totalReps = session.exercises.reduce((sum, ex) => sum + (ex.totalReps || 0), 0);
          const totalTime = session.exercises.reduce((sum, ex) => sum + (ex.totalTime || 0), 0);

          html += `
            <div style="background: rgba(0,0,0,0.2); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-md);">
              <div class="flex-between mb-md">
                <div>
                  <div class="text-small text-secondary">${dateStr} at ${timeStr}</div>
                </div>
                <button class="btn btn-icon btn-secondary small" onclick="Player.confirmDeleteSession('${session.id}')" title="Delete Session">
                  ${UI.icon('trash')}
                </button>
              </div>
              <div class="session-summary">
                <div class="session-stat">
                  <span class="session-stat-value">${totalSets}</span>
                  <span class="session-stat-label">Sets</span>
                </div>
                <div class="session-stat">
                  <span class="session-stat-value">${totalReps}</span>
                  <span class="session-stat-label">Total Reps</span>
                </div>
                <div class="session-stat">
                  <span class="session-stat-value">${UI.formatTime(totalTime)}</span>
                  <span class="session-stat-label">Time</span>
                </div>
              </div>
          `;

          // Exercise details
          html += '<div class="session-exercises">';
          session.exercises.forEach(exData => {
            const exercise = Storage.getExercise(exData.exerciseId);
            const exName = exercise ? exercise.name : 'Deleted Exercise';
            const sets = exData.sets || [];

            html += `
              <div class="session-exercise-item">
                <div class="session-exercise-name">${exName}</div>
                <div class="set-pills">
            `;

            if (sets.length > 0) {
              sets.forEach((s, si) => {
                const reps = typeof s === 'object' ? s.reps : s;
                const time = typeof s === 'object' ? s.time : 0;
                html += `<span class="set-pill">Set ${si + 1}: ${reps} rep${time > 0 ? ' - ' + UI.formatTime(time) : ''}</span>`;
              });
            } else if (exData.totalReps) {
              html += `<span class="set-pill">${exData.setsCount || '?'} sets, ${exData.totalReps} total reps</span>`;
            }

            html += `
                </div>
              </div>
            `;
          });
          html += '</div></div>';
        });

        html += `
            </div>
          </div>
        `;
      }
    }

    html += '</div>';
    return html;
  }

  function toggleSessionGroup(workoutId) {
    const el = document.getElementById(`session-group-${workoutId}`);
    const icon = document.getElementById(`session-icon-${workoutId}`);
    if (el) {
      el.classList.toggle('hidden');
      if (el.classList.contains('hidden')) {
        expandedGroups.delete(workoutId);
        icon.innerHTML = UI.icon('chevronDown');
      } else {
        expandedGroups.add(workoutId);
        icon.innerHTML = UI.icon('chevronUp');
      }
    }
  }

  function confirmDeleteSessionsGroup(workoutId) {
    const workout = Storage.getWorkout(workoutId);
    const wName = workout ? workout.name : 'this workout';
    UI.confirmModal('Delete Group', `Are you sure you want to delete ALL historical sessions for "<strong>${wName}</strong>"?<br>Data will be lost forever.`, () => {
      Storage.deleteSessionsByWorkout(workoutId);
      UI.showToast('All sessions deleted', 'success');
      App.navigate('#sessions');
    });
  }

/* ============================================
   PhysioTrainer â€” App Router & Init
   SPA hash-based routing
   ============================================ */

const App = (() => {

  const appContainer = document.getElementById('app-container');

  function navigate(hash) {
    if (window.location.hash === hash) {
      route();
    } else {
      window.location.hash = hash;
    }
  }

  function goBack(fallbackHash = '#home') {
    const prev = window.location.hash;
    window.history.back();
    setTimeout(() => {
      if (window.location.hash === prev) {
         window.location.hash = fallbackHash;
      }
    }, 50);
  }

  let isRoutingEnabled = true;

  function route() {
    if (!isRoutingEnabled) return;

    const hash = window.location.hash || '#home';
    const prevHash = document.body.dataset.currentHash || '#home';

    // Intercept hardware/browser back button if leaving an active workout
    const isCurrentlyInWorkout = prevHash.startsWith('#play/');
    const isGoingToLeaveWorkout = !hash.startsWith('#play/');

    if (isCurrentlyInWorkout && isGoingToLeaveWorkout && Player.hasActiveSessionData()) {
      isRoutingEnabled = false;
      // Revert the hash
      window.history.pushState(null, '', prevHash);
      isRoutingEnabled = true;
      // Trigger the exit prompt
      Player.exitWorkout();
      return;
    }

    // Save the normal hash state
    document.body.dataset.currentHash = hash;

    const parts = hash.replace('#', '').split('/');
    const page = parts[0];
    const param1 = parts[1] || null;
    const param2 = parts[2] || null;

    let content = '';
    let activeNav = '';

    switch (page) {
      case 'home':
        content = renderHome();
        activeNav = 'home';
        break;

      case 'exercises':
        content = Exercises.renderList();
        activeNav = 'exercises';
        break;

      case 'exercise':
        if (param1 === 'new') {
          Exercises.initFormMedia(null);
          content = Exercises.renderForm(null);
        } else {
          Exercises.initFormMedia(param1);
          content = Exercises.renderForm(param1);
        }
        activeNav = 'exercises';
        break;

      case 'workouts':
        content = Workouts.renderList();
        activeNav = 'workouts';
        break;

      case 'workout':
        content = Workouts.renderForm(param1 === 'new' ? null : param1);
        activeNav = 'workouts';
        break;

      case 'play':
        if (param2) {
          content = Player.renderPlayer(param1, param2);
        } else {
          content = Player.renderExerciseSelection(param1);
        }
        activeNav = 'workouts';
        break;

      case 'sessions':
        content = Player.renderSessions();
        activeNav = 'sessions';
        break;

      case 'settings':
        content = renderSettings();
        activeNav = 'settings';
        break;

      default:
        content = renderHome();
        activeNav = 'home';
    }

    appContainer.innerHTML = content + renderBottomNav(activeNav);

    if (activeNav === 'sessions') {

  // --- Chart Logic ---
  function renderWeeklyChart() {
    const canvas = document.getElementById('weekly-chart-canvas');
    if (!canvas) return;
    
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    
    const W = rect.width;
    const H = rect.height;
    ctx.clearRect(0, 0, W, H);
    
    // Get last 7 days stats
    const sessions = Storage.getSessions();
    const days = 7;
    const data = [];
    const today = new Date();
    today.setHours(0,0,0,0);
    
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const isToday = i === 0;
      const dayLabel = d.toLocaleDateString('en-US', { weekday: 'narrow' });
      
      const startOfDay = d.getTime();
      const endOfDay = startOfDay + 24*60*60*1000;
      
      let dayWorkouts = [];
      sessions.forEach(s => {
        const sTime = new Date(s.date).getTime();
        if (sTime >= startOfDay && sTime < endOfDay) {
          dayWorkouts.push(s.workoutId || 'unknown');
        }
      });
      data.push({ label: dayLabel, count: dayWorkouts.length, workouts: dayWorkouts, isToday });
    }
    
    const maxCount = Math.max(1, ...data.map(d => d.count));
    const maxVal = Math.ceil(maxCount / 2) * 2; 
    
    const padL = 20, padR = 8, padT = 16, padB = 24;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const gap = chartW / data.length;
    const barW = Math.min(gap * 0.6, 24);
    
    // Y Axis lines
    ctx.fillStyle = '#6b6b80';
    ctx.font = '500 10px Inter, sans-serif';
    ctx.textAlign = 'right';
    
    for (let i = 0; i <= 2; i++) {
        const yVal = (maxVal / 2) * i;
        if (!Number.isInteger(yVal)) continue;
        const yPos = padT + chartH - (chartH * (yVal / maxVal));
        ctx.fillText(yVal, padL - 6, yPos + 3);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padL, yPos);
        ctx.lineTo(W - padR, yPos);
        ctx.stroke();
    }
    
    // Bars
    data.forEach((d, idx) => {
        const x = padL + gap * idx + (gap - barW) / 2;
        
        if (d.count > 0) {
            let currentY = padT + chartH;
            const segmentH = chartH / maxVal;
            
            d.workouts.forEach((wId, wIdx) => {
                const color = UI.getWorkoutColor(wId);
                const h = Math.max(segmentH, 4);
                const y = currentY - h;
                
                ctx.fillStyle = color;
                
                const isTop = wIdx === d.workouts.length - 1;
                const r = isTop ? Math.min(barW / 2, 6) : 0;
                
                ctx.beginPath();
                ctx.moveTo(x, y + r);
                ctx.arcTo(x, y, x + r, y, r);
                ctx.arcTo(x + barW, y, x + barW, y + r, r);
                ctx.lineTo(x + barW, currentY);
                ctx.lineTo(x, currentY);
                ctx.closePath();
                ctx.fill();
                
                if (wIdx > 0) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(x, currentY - 1, barW, 2);
                }
                
                currentY = y;
            });
        }
        
        ctx.fillStyle = d.isToday ? '#38bdf8' : '#6b6b80';
        ctx.font = (d.isToday ? '700' : '500') + ' 10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(d.label, x + barW / 2, H - 4);
    });
  }

  // --- Export/Import ---
  function exportData() {
    const data = Storage.exportData();
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `physiotrainer_backup_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    UI.showToast('Data exported!', 'success');
  }

  function handleTimerSoundUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > 2 * 1024 * 1024) {
      UI.showToast('Audio file too large (max 2MB)', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      Storage.saveSetting('timerSound', e.target.result);
      UI.showToast('Timer sound uploaded successfully!', 'success');
      App.navigate('#settings'); // Re-render settings to show new status
    };
    reader.readAsDataURL(file);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const success = Storage.importData(e.target.result);
      if (success) {
        UI.showToast('Data imported successfully!', 'success');
        route();
      } else {
        UI.showToast('Error importing data', 'error');
      }
    };
    reader.readAsText(file);
  }

        UI.showToast('All data cleared', 'success');
        route();
      }
    );

  // --- Bottom Navigation ---
  function renderBottomNav(active) {
    const items = [
      { id: 'home', icon: 'home', label: 'Home', hash: '#home' },
      { id: 'exercises', icon: 'activity', label: 'Exercises', hash: '#exercises' },
      { id: 'workouts', icon: 'clipboard', label: 'Workouts', hash: '#workouts' },
      { id: 'sessions', icon: 'clock', label: 'Sessions', hash: '#sessions' },
      { id: 'settings', icon: 'settings', label: 'Settings', hash: '#settings' },
    ];

    let html = '<nav class="bottom-nav">';
    items.forEach(item => {
      const isActive = item.id === active ? 'active' : '';
      html += `
        <button class="nav-item ${isActive}" onclick="App.navigate('${item.hash}')" aria-label="${item.label}">
          ${UI.icon(item.icon)}
          <span>${item.label}</span>
        </button>
      `;
    });
    html += '</nav>';
    return html;
  }

  // --- Init ---
  function init() {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().then(granted => {
        if (granted) console.log("Storage is persistent.");
      });
    }

    if (!window.location.hash || window.location.hash === '#home') {
      window.history.replaceState(null, '', '#home');
    } else {
      const currentHash = window.location.hash;
      window.history.replaceState(null, '', '#home');
      window.history.pushState(null, '', currentHash);
    }
    window.addEventListener('hashchange', route);
    route();
  }

  return {
    navigate,
    goBack,
    init,
    exportData,
    handleTimerSoundUpload,
    importData,
    confirmClearData,

  };
})();

// Boot
document.addEventListener('DOMContentLoaded', () => {
  Storage.loadData().then(() => {

  });
});
